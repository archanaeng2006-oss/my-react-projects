<!DOCTYPE html>
<html>
    <head>
        <title>JavaScrit DOM -To-App</title>
        <style>
            body{
                font-family:Arial;
                Width:350px;
                margin:30px auto;

            }
            input{
                Width:220px;
                padding:8px;
            }
            button{
                padding:8px 12px;
            }
            li{
                margin:10px 0;
            }
        </style>
    </head>
    <body>
        <h2 id="heading">My To-Do Application</h2>
        <input type="text" id="task" placeholder="Enter Task">
        <button id="addBtn"> Add Task</button>
        <ul id="taskList"></ul>
        <script>
            //DOM
            const heading = document.getElementById("heading");
            const taskInput = document.getElementById("task");
             const addButton = document.getElementById("addBtn");
             const taskList= document.getElementById("taskList");
             //Event Listener
             addButton.addEventListener("click",addTask);
             //change heading when mouse is over it(Event)
             heading.addEventListener("mouseover",function(){
heading.innerHTML "JavaScript DOM Manipulation";
             });
           //load task from local storage
           Window.onload = function(){
            let tasks = JSON>parse(localstorage.getItems("tasks"))||[];
            tasks.foreach(function(task){
                createTask(task);
           } );
        };
        //Function
        function addTask(){
            //Form validation
            if(taskInput.value.trim() ==""){
                alert("please enter a task.");
                return;

            }
            createTask(taskInput.value);
            let tasks = JSON.parse(localstorage.getItem("task")) || [];
            localstorage.setItem("task",JSON.stringify(tasks));
            taskInput.value="";
        }
        //Create Task
        function CreateTask(task){
            li.innerHTML = task +" ";
            let removeBtn = document.CreateElement("button");
            removeBtn.innerHTML = "Delete";
            removeBtn.addEventListener("click", function(){
                li.remove();
                let tasks = JSON.parse(localstorage.getItem("tasks")) || [];
                tasks = tasks.filter(function(item){
                    return item !== task;
                });
                localstorage setItem("tasks",JSON.stringify(tasks));
            });
            li.appendchild(removeBtn);

            taskList.append(li);
        }

        </script>
    </body>
</html>
