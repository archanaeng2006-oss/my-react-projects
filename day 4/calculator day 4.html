<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#6a11cb,#2575fc);
        }

        .calculator{
            background:#222;
            padding:20px;
            border-radius:15px;
            box-shadow:0 10px 20px rgba(0,0,0,0.3);
        }

        #display{
            width:100%;
            height:70px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            background:#f5f5f5;
            text-align:right;
            font-size:28px;
            padding:10px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,70px);
            gap:10px;
        }

        button{
            height:60px;
            border:none;
            border-radius:10px;
            font-size:22px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:scale(1.05);
        }

        .operator{
            background:#ff9800;
            color:#fff;
        }

        .equal{
            background:#4caf50;
            color:#fff;
        }

        .clear{
            background:#f44336;
            color:#fff;
        }

        .number{
            background:#fff;
        }
    </style>
</head>
<body>

<div class="calculator">

    <input type="text" id="display" value="0" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>

</div>

<script>
    let display = document.getElementById("display");

    function append(value){
        if(display.value === "0"){
            display.value = value;
        }else{
            display.value += value;
        }
    }

    function clearDisplay(){
        display.value = "0";
    }

    function deleteLast(){
        display.value = display.value.slice(0,-1);

        if(display.value === ""){
            display.value = "0";
        }
    }

    function calculate(){
        try{
            display.value = eval(display.value);
        }
        catch{
            display.value = "Error";
        }
    }
</script>

</body>
</html>
