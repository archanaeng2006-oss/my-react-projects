<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Number Generator</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6dd5ed, #2193b0);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,0.3);
        }

        h1{
            color:#333;
        }

        button{
            padding:12px 25px;
            font-size:18px;
            border:none;
            border-radius:8px;
            background:#007bff;
            color:white;
            cursor:pointer;
            margin-top:15px;
        }

        button:hover{
            background:#0056b3;
        }

        #result{
            margin-top:20px;
            font-size:30px;
            font-weight:bold;
            color:#e91e63;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎉 Lucky Number Generator 🎉</h1>

    <button onclick="generateLuckyNumber()">
        Get Lucky Number
    </button>

    <div id="result">?</div>
</div>

<script>
    function generateLuckyNumber() {
        let luckyNumber = Math.floor(Math.random() * 100) + 1;
        document.getElementById("result").innerHTML = luckyNumber;
    }
</script>

</body>
</html>
